name: SparkyTube CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Ensure Gradle wrapper jar exists
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "wrapper jar missing, bootstrapping via system gradle"
            gradle wrapper --gradle-version 8.7
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APKs (all ABI splits + universal)
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | grep -v "D8: An error occurred when parsing kotlin metadata\|To find compatible kotlin versions"

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: SparkyTube-debug-apks
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # Release build only runs when you push a version tag like v1.0.0,
      # so day-to-day pushes to main stay fast (debug build only).
  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Ensure Gradle wrapper jar exists
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "wrapper jar missing, bootstrapping via system gradle"
            gradle wrapper --gradle-version 8.7
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode signing keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Build release APKs (all ABI splits + universal)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace 2>&1 | grep -v "D8: An error occurred when parsing kotlin metadata\|To find compatible kotlin versions"

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: SparkyTube-release-apks
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Attach APKs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
