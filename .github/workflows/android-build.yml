name: SparkyTube CI Build

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build Debug APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Ensure Gradle wrapper jar exists
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "wrapper jar missing, bootstrapping via system gradle"
            gradle wrapper --gradle-version 8.7
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APKs (all ABI splits + universal)
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | grep -v "D8: An error occurred when parsing kotlin metadata\|To find compatible kotlin versions"

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: SparkyTube-debug-apks
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: build
    # Main branch push OR tag push par release build trigger hoga
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Ensure Gradle wrapper jar exists
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "wrapper jar missing, bootstrapping via system gradle"
            gradle wrapper --gradle-version 8.7
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
            echo "Keystore decoded successfully."
          else
            echo "KEYSTORE_BASE64 secret missing!"
          fi

      - name: Build release APKs (all ABI splits + universal)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace 2>&1 | grep -v "D8: An error occurred when parsing kotlin metadata\|To find compatible kotlin versions"

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: SparkyTube-release-apks
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Attach APKs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk